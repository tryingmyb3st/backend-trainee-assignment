services:
  backend:
    build: .
    depends_on:
      - migrations
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8080:8080"
  db:
    image: postgres:17
    container_name: postgres_db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  migrations:
    image: migrate/migrate
    command: ["-database", "${DATABASE_URL}", "-path", "/migrations", "up"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - "./migrations:/migrations"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  migrations:

